name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  IMAGE_NAME: ojasbansal/cloudpulse-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./app
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./app
        run: pytest -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set environment tag
        id: vars
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "env_name=production" >> $GITHUB_OUTPUT
          else
            echo "tag=staging" >> $GITHUB_OUTPUT
            echo "env_name=staging" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      # GitOps step: instead of deploying directly, we update the Helm values
      # file in Git with the new image tag/sha. ArgoCD is watching this repo
      # and will detect the change and sync it to the cluster automatically.
      - name: Update Helm values with new image tag (GitOps trigger)
        run: |
          sed -i "s/tag:.*/tag: \"${{ github.sha }}\"/" helm-chart/cloudpulse/values-${{ steps.vars.outputs.env_name }}.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add helm-chart/cloudpulse/values-${{ steps.vars.outputs.env_name }}.yaml
          git commit -m "ci: deploy ${{ github.sha }} to ${{ steps.vars.outputs.env_name }}" || echo "No changes to commit"
          git push
