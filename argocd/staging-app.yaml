apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudpulse-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/cloudpulse.git
    targetRevision: develop
    path: helm-chart/cloudpulse
    helm:
      valueFiles:
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true      # remove resources that are no longer in Git
      selfHeal: true    # if someone manually changes the cluster, revert it to match Git
    syncOptions:
      - CreateNamespace=true
