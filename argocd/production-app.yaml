apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudpulse-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/cloudpulse.git
    targetRevision: main
    path: helm-chart/cloudpulse
    helm:
      valueFiles:
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
